<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>データ活用・プライバシー炎上事例カタログ</title>
    <script>
      // GitHub Pages SPA redirect
      // https://github.com/rafgraph/spa-github-pages
      sessionStorage.redirect = location.href;
      location.replace(
        location.pathname.split('/').slice(0, 2).join('/') + '/'
      );
    </script>
  </head>

</html>
